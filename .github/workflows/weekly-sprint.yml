name: 📅 주간 AI 스프린트

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      sprint_focus:
        description: "이번 스프린트 포커스 (예: 성능, UX, 버그수정)"
        required: false
        default: "BACKLOG.md 상위 항목"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sprint:
    name: 주간 스프린트
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 BACKLOG.md 읽기 + 스프린트 계획
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            주간 AI 스프린트를 실행해줘.

            ## 프로젝트: fieldnine.io (Dalkak AI App Builder)
            - Next.js 16 + TypeScript + Supabase + Toss Payments
            - 1인 개발자 프로젝트, 팀 에이전트로 운영

            ## 이번 주 스프린트 포커스
            ${{ github.event.inputs.sprint_focus || 'BACKLOG.md 상위 우선순위 항목' }}

            ## 실행 순서
            1. BACKLOG.md 파일 읽기
            2. 우선순위 "높음" 항목 중 구현 가능한 것 1-3개 선택
            3. 각 항목 구현 (tsc 확인 필수)
            4. BACKLOG.md에서 완료 항목 체크
            5. 변경사항으로 PR 생성

            ## 규칙
            - 한 번에 너무 많은 것 하지 말 것 (1-3개만)
            - 기존 패턴 따르기
            - TypeScript strict 준수
            - 각 기능에 간단한 테스트 추가

            ## 결과물
            - PR 생성 (제목: "스프린트 W{주차}: {구현 항목 요약}")
            - PR 본문에 구현한 것, 스킵한 것, 이유 설명
          github_token: ${{ secrets.GITHUB_TOKEN }}
